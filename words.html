<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>냥냥 영어 단어장</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/localforage/1.10.0/localforage.min.js"></script>
    <style>
        :root {
            --primary-color: #4A90E2;
            --secondary-color: #F5A623;
            --success-color: #2ECC71;
            --danger-color: #E74C3C;
            --bg-color: #F8FAFC;
        }
        body {
            font-family: 'Malgun Gothic', sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .container {
            width: 100%;
            max-width: 600px;
            background: white;
            padding: 25px;
            border-radius: 20px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.05);
        }
        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 25px;
        }
        .tab-btn {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            background: #E2E8F0;
            transition: all 0.2s;
        }
        .tab-btn.active {
            background: var(--primary-color);
            color: white;
        }
        .panel { display: none; }
        .panel.active { display: block; }
        
        /* 공통 폼 스타일 */
        label { display: block; margin-top: 15px; font-weight: bold; color: #334155; }
        input, select {
            width: 100%;
            padding: 12px;
            margin-top: 6px;
            border: 2px solid #E2E8F0;
            border-radius: 10px;
            box-sizing: border-box;
            font-size: 16px;
        }
        input:focus { border-color: var(--primary-color); outline: none; }
        
        button.main-btn {
            width: 100%;
            padding: 15px;
            margin-top: 20px;
            border: none;
            border-radius: 12px;
            font-size: 18px;
            font-weight: bold;
            color: white;
            cursor: pointer;
            background: var(--primary-color);
            transition: transform 0.1s, opacity 0.1s;
        }
        button.main-btn:active {
            transform: scale(0.98);
            opacity: 0.9;
        }
        
        /* 퀴즈 영역 */
        .setup-box { background: #F1F5F9; padding: 20px; border-radius: 15px; text-align: center; }
        .quiz-box { text-align: center; padding: 20px 0; display: none; }
        .word-display { font-size: 48px; font-weight: bold; color: #1E293B; margin: 20px 0; min-height: 70px; }
        .hint-text { font-size: 24px; color: #64748B; margin-bottom: 20px; display: none; }
        
        .quiz-btns { display: flex; flex-direction: column; gap: 10px; margin-top: 20px; }
        .row-btns { display: flex; gap: 10px; }
        .row-btns button { flex: 1; }
        
        .btn-audio { background: var(--secondary-color); color: white; }
        .btn-hint { background: #64748B; color: white; }
        .btn-correct { background: var(--success-color); color: white; }
        .btn-wrong { background: var(--danger-color); color: white; }
        .btn-next { background: var(--primary-color); color: white; }
        
        /* 결과 영역 */
        .result-box { text-align: center; padding: 20px 0; display: none; }
        .btn-retry-all { background: #10B981; color: white; }    /* 초록색 버튼 */
        .btn-retry-wrong { background: #8B5CF6; color: white; }  /* 보라색 버튼 */

        /* 백업/로드 영역 */
        .backup-box {
            background: #F8FAFC;
            border: 2px dashed #CBD5E1;
            padding: 15px;
            border-radius: 12px;
            margin-top: 25px;
            text-align: center;
        }
        .btn-backup { background: #475569 !important; color: white; }
        .btn-load { background: #0F172A !important; color: white; }

        /* 관리 리스트 테이블 */
        table { width: 100%; border-collapse: collapse; margin-top: 20px; font-size: 14px; }
        th, td { border-bottom: 1px solid #E2E8F0; padding: 12px 8px; text-align: left; }
        th { background-color: #F8FAFC; color: #64748B; }
        .action-btns { display: flex; gap: 4px; }
        .action-btns button { padding: 6px 10px; border: none; border-radius: 6px; cursor: pointer; font-size: 12px; }
        .btn-edit { background: #EDF2F7; color: #2D3748; }
        .btn-delete { background: #FED7D7; color: #C53030; }
        
        /* 상태 표시기 */
        .status-badge { display: inline-block; padding: 2px 6px; border-radius: 4px; font-size: 11px; font-weight: bold; }
        .badge-new { background: #EBF8FF; color: #2B6CB0; }
        .badge-review { background: #FFF5F5; color: #C53030; }

        /* 선택된 단어 칩 영역 스타일 */
        .selected-words-box {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 10px;
            background: white;
            padding: 10px;
            border-radius: 10px;
            min-height: 40px;
            border: 1px solid #E2E8F0;
        }
        .word-chip {
            background: #EBF8FF;
            color: #2B6CB0;
            padding: 5px 10px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .word-chip .remove-btn {
            cursor: pointer;
            color: #E74C3C;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="tabs">
        <button class="tab-btn active" onclick="switchTab('quiz')">✏️ 단어 테스트</button>
        <button class="tab-btn" onclick="switchTab('manage')">⚙️ 단어 등록 및 관리</button>
    </div>

    <div id="quiz-panel" class="panel active">
        <div id="setup-area" class="setup-box">
            <h3>📖 영단어 테스트 준비</h3>
            <p id="total-info">현재 등록된 단어: 계산 중...</p>
            <div style="margin: 15px 0; text-align: left;">
                <label for="quiz-count">✍️ 테스트할 총 단어 개수:</label>
                <input type="number" id="quiz-count" min="1" value="5" placeholder="예: 5">

                <!-- 검색 가능한 단어 선택 기능 상자 -->
                <label for="word-search-input">🎯 꼭 포함할 단어 검색 및 선택 (선택 사항):</label>
                <input type="text" id="word-search-input" list="word-search-options" placeholder="🔍 단어나 뜻을 입력하면 나타나요..." oninput="handleWordSearchSelect()">
                <datalist id="word-search-options">
                    <!-- 자바스크립트에서 동적 생성됨 -->
                </datalist>
                
                <div style="font-size: 12px; color: #64748B; margin-top: 10px; font-weight: bold;">내가 직접 고른 단어 목록:</div>
                <div id="selected-words-container" class="selected-words-box">
                    <span style="color: #94A3B8; font-size: 13px; width: 100%; text-align: center;">직접 선택한 단어가 없습니다.</span>
                </div>
            </div>
            <button class="main-btn" onclick="startQuiz()">테스트 시작하기 🚀</button>
        </div>

        <div id="quiz-area" class="quiz-box">
            <div id="progress-text" style="font-weight: bold; color: var(--primary-color);">[ 1 / 5 ]</div>
            
            <div class="quiz-btns">
                <button class="main-btn btn-audio" onclick="playCurrentAudio()">🎤 목소리 다시 듣기</button>
                <button class="main-btn btn-hint" id="hint-btn" onclick="showHint()">👀 정답 확인하기</button>
                
                <div id="ox-area" class="row-btns" style="display: none;">
                    <div id="word-target" class="word-display">Word</div>
                    <div id="hint-target" class="hint-text">뜻</div>
                    <button class="main-btn btn-correct" onclick="handleResult(true)">⭕ 맞았어요!</button>
                    <button class="main-btn btn-wrong" onclick="handleResult(false)">❌ 틀렸어요</button>
                </div>
                
                <button class="main-btn btn-next" id="next-btn" onclick="nextQuestion()" style="display: none;">다음 문제로 ➡️</button>
            </div>
        </div>

        <div id="result-area" class="result-box">
            <h2>🎉 테스트 완료!</h2>
            <p id="result-summary" style="font-size: 18px; font-weight: bold; margin: 20px 0; color: #334155;"></p>
            
            <div class="quiz-btns" style="margin-bottom: 15px;">
                <button class="main-btn btn-retry-all" onclick="startCurrentRoundAgain()">🔄 방금 친 단어 전체 재시험</button>
                <button class="main-btn btn-retry-wrong" id="retry-wrong-btn" onclick="startWrongQuiz()" style="display: none;">❌ 틀린 단어만 재시험 보기</button>
            </div>
            
            <button class="main-btn" onclick="initQuizArea()" style="background:#718096; margin-top: 0;">메인화면으로 돌아가기 🏠</button>
        </div>
    </div>

    <div id="manage-panel" class="panel">
        <h3 id="form-title">📝 새 단어 추가하기</h3>
        <input type="hidden" id="edit-id">
        
        <label for="word-en">영어 단어</label>
        <input type="text" id="word-en" placeholder="예: apple">
        
        <label for="word-ko">한국어 뜻</label>
        <input type="text" id="word-ko" placeholder="예: 사과">
        
        <label>🎤 발음 녹음 (엄마/아빠 목소리)</label>
        <div class="row-btns" style="margin-top:6px;">
            <button type="button" class="main-btn" id="record-btn" onclick="toggleRecording()" style="margin:0; background:#4A5568;">🔴 녹음 시작</button>
            <button type="button" class="main-btn" id="play-recorded-btn" onclick="playRecorded()" style="margin:0; background:#EDF2F7; color:#2D3748;" disabled>▶️ 들어보기</button>
        </div>
        
        <button class="main-btn" id="submit-btn" onclick="saveWord()">✅ 단어 저장하기</button>
        <button class="main-btn" id="cancel-btn" onclick="resetForm()" style="background:#718096; display:none; margin-top:5px;">취소</button>
        
        <div class="backup-box">
            <h4 style="margin: 0 0 10px 0; color: #334155;">💾 단어 데이터 백업 및 복원</h4>
            <div class="row-btns">
                <button class="main-btn btn-backup" style="margin:0; padding:10px; font-size:14px;" onclick="backupData()">📤 파일로 백업받기</button>
                <button class="main-btn btn-load" style="margin:0; padding:10px; font-size:14px;" onclick="triggerLoadFile()">📥 백업 파일 불러오기</button>
            </div>
            <input type="file" id="backup-file-input" accept=".json" style="display: none;" onchange="loadBackupData(event)">
        </div>

        <hr style="margin: 30px 0; border: 0; border-top: 1px solid #E2E8F0;">
        
        <h3>📋 등록된 단어 목록</h3>
        <div style="overflow-x: auto;">
            <table>
                <thead>
                    <tr>
                        <th>영어 / 뜻</th>
                        <th>테스트 스탯</th>
                        <th>관리</th>
                    </tr>
                </thead>
                <tbody id="word-list-tbody">
                </tbody>
            </table>
        </div>
    </div>
</div>

<script>
    let dbWords = [];       
    let testQueue = [];     
    let currentIdx = 0;     
    let wrongWordsThisRound = []; 
    let currentRoundOriginalWords = []; 
    
    // 수동 선택 단어의 고유 ID 보관소
    let customSelectedIds = [];

    let mediaRecorder;
    let audioChunks = [];
    let currentBase64Audio = "";

    function switchTab(tab) {
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
        
        if(tab === 'quiz') {
            document.querySelectorAll('.tab-btn')[0].classList.add('active');
            document.getElementById('quiz-panel').classList.add('active');
            initQuizArea();
        } else {
            document.querySelectorAll('.tab-btn')[1].classList.add('active');
            document.getElementById('manage-panel').classList.add('active');
            loadWordList();
        }
    }

    window.addEventListener('DOMContentLoaded', async () => {
        await initQuizArea();
    });

    async function initQuizArea() {
        dbWords = await localforage.getItem('wordbook') || [];
        document.getElementById('total-info').innerText = `현재 저장된 총 단어 수: ${dbWords.length}개`;
        
        customSelectedIds = []; 
        document.getElementById('word-search-input').value = "";
        renderSelectedChips();
        updateQuizDropdown();

        document.getElementById('setup-area').style.display = 'block';
        document.getElementById('quiz-area').style.display = 'none';
        document.getElementById('result-area').style.display = 'none';
    }

    // 검색용 데이터리스트 목록 갱신 기능
    function updateQuizDropdown() {
        const datalist = document.getElementById('word-search-options');
        datalist.innerHTML = '';
        
        const sortedWords = [...dbWords].sort((a, b) => a.en.localeCompare(b.en));
        
        sortedWords.forEach(word => {
            if (!customSelectedIds.includes(word.id)) {
                const opt = document.createElement('option');
                opt.value = word.en; 
                opt.innerText = word.ko;
                opt.dataset.id = word.id;
                datalist.appendChild(opt);
            }
        });
    }

    // 실시간 검색 매칭 후 단어 칩 추가 기능
    function handleWordSearchSelect() {
        const input = document.getElementById('word-search-input');
        const val = input.value.trim();
        if (!val) return;

        const options = document.querySelectorAll('#word-search-options option');
        let targetId = null;

        for (let opt of options) {
            if (opt.value.toLowerCase() === val.toLowerCase() || opt.innerText === val) {
                targetId = parseInt(opt.dataset.id);
                break;
            }
        }

        if (targetId && !customSelectedIds.includes(targetId)) {
            customSelectedIds.push(targetId);
            input.value = ""; 
            renderSelectedChips();
            updateQuizDropdown();
        }
    }

    // 단어 선택 해제 기능
    function removeSelectedWord(id) {
        customSelectedIds = customSelectedIds.filter(itemId => itemId !== id);
        renderSelectedChips();
        updateQuizDropdown();
    }

    // 고른 단어 카드식 UI 빌더
    function renderSelectedChips() {
        const container = document.getElementById('selected-words-container');
        if (customSelectedIds.length === 0) {
            container.innerHTML = '<span style="color: #94A3B8; font-size: 13px; width: 100%; text-align: center;">직접 선택한 단어가 없습니다.</span>';
            return;
        }

        container.innerHTML = '';
        customSelectedIds.forEach(id => {
            const word = dbWords.find(w => w.id === id);
            if (word) {
                const chip = document.createElement('span');
                chip.className = 'word-chip';
                chip.innerHTML = `${word.en} (${word.ko}) <span class="remove-btn" onclick="removeSelectedWord(${word.id})">✕</span>`;
                container.appendChild(chip);
            }
        });
    }

    function startQuiz() {
        if (dbWords.length === 0) {
            alert("테스트할 단어가 없습니다. 단어를 먼저 등록해주세요!");
            switchTab('manage');
            return;
        }

        let inputCount = parseInt(document.getElementById('quiz-count').value) || 5;
        if (inputCount <= 0) inputCount = 5;
        
        let finalCount = Math.min(inputCount, dbWords.length);

        // 직접 고른 단어 세팅
        let chosenWords = dbWords.filter(word => customSelectedIds.includes(word.id));
        
        if (finalCount < chosenWords.length) {
            finalCount = chosenWords.length;
            document.getElementById('quiz-count').value = finalCount;
        }

        // 남는 자리 자동 매칭 알고리즘 가동
        let remainingCount = finalCount - chosenWords.length;
        let otherWords = [];

        if (remainingCount > 0) {
            let scoredWords = dbWords
                .filter(word => !customSelectedIds.includes(word.id)) 
                .map(word => {
                    let total = word.totalCount || 0;
                    let wrong = word.wrongCount || 0;
                    let wrongRate = total > 0 ? wrong / total : 0;
                    let isNew = total === 0 ? 1 : 0;

                    let priorityScore = (isNew ? 1.0 : wrongRate) + (Math.random() * 0.01);
                    return { ...word, priorityScore };
                });

            scoredWords.sort((a, b) => b.priorityScore - a.priorityScore);
            otherWords = scoredWords.slice(0, remainingCount);
        }

        // 전체 합산 후 출제 순서 랜덤 셔플
        testQueue = [...chosenWords, ...otherWords].sort(() => Math.random() - 0.5);
        
        currentRoundOriginalWords = [...testQueue];
        wrongWordsThisRound = []; 
        currentIdx = 0;
        
        document.getElementById('setup-area').style.display = 'none';
        document.getElementById('result-area').style.display = 'none';
        document.getElementById('quiz-area').style.display = 'block';
        showQuestion();
    }

    function startCurrentRoundAgain() {
        if (currentRoundOriginalWords.length === 0) return;

        testQueue = [...currentRoundOriginalWords];
        wrongWordsThisRound = []; 
        currentIdx = 0;

        document.getElementById('result-area').style.display = 'none';
        document.getElementById('quiz-area').style.display = 'block';
        showQuestion();
    }

    function startWrongQuiz() {
        if (wrongWordsThisRound.length === 0) return;

        testQueue = [...wrongWordsThisRound];
        wrongWordsThisRound = []; 
        currentIdx = 0;

        document.getElementById('result-area').style.display = 'none';
        document.getElementById('quiz-area').style.display = 'block';
        showQuestion();
    }

    function showQuestion() {
        let currentWord = testQueue[currentIdx];
        
        document.getElementById('progress-text').innerText = `[ ${currentIdx + 1} / ${testQueue.length} ]`;
        document.getElementById('word-target').innerText = currentWord.en;
        document.getElementById('hint-target').innerText = currentWord.ko;
        
        document.getElementById('hint-target').style.display = 'none';
        document.getElementById('hint-btn').style.display = 'block';
        document.getElementById('ox-area').style.display = 'none';
        document.getElementById('next-btn').style.display = 'none';

        setTimeout(() => { playCurrentAudio(); }, 300);
    }

    function showHint() {
        document.getElementById('hint-target').style.display = 'block';
        document.getElementById('hint-btn').style.display = 'none';
        document.getElementById('ox-area').style.display = 'flex';
    }

    async function handleResult(isCorrect) {
        let currentWord = testQueue[currentIdx];
        let targetIdx = dbWords.findIndex(w => w.id === currentWord.id);
        
        if (targetIdx !== -1) {
            if (!dbWords[targetIdx].totalCount) dbWords[targetIdx].totalCount = 0;
            if (!dbWords[targetIdx].wrongCount) dbWords[targetIdx].wrongCount = 0;

            dbWords[targetIdx].totalCount += 1;
            if (!isCorrect) {
                dbWords[targetIdx].wrongCount += 1;
            }
            await localforage.setItem('wordbook', dbWords);
        }

        if (!isCorrect) {
            if (!wrongWordsThisRound.some(w => w.id === currentWord.id)) {
                wrongWordsThisRound.push(currentWord);
            }
        }

        document.getElementById('ox-area').style.display = 'none';
        document.getElementById('next-btn').style.display = 'block';
    }

    function nextQuestion() {
        currentIdx++;
        if (currentIdx < testQueue.length) {
            showQuestion();
        } else {
            finishQuiz();
        }
    }

    function finishQuiz() {
        document.getElementById('quiz-area').style.display = 'none';
        document.getElementById('result-area').style.display = 'block';

        const totalTestCount = testQueue.length;
        const wrongCount = wrongWordsThisRound.length;
        const correctCount = totalTestCount - wrongCount;

        let summaryText = `총 ${totalTestCount}문제 중 ${correctCount}문제를 맞췄습니다!`;
        
        if (wrongCount > 0) {
            summaryText += `<br><span style="color: var(--danger-color); font-size:16px;">틀린 단어가 ${wrongCount}개 있습니다. 복습해볼까요?</span>`;
            document.getElementById('retry-wrong-btn').style.display = 'block';
            document.getElementById('retry-wrong-btn').innerText = `❌ 틀린 단어 (${wrongCount}개)만 다시 시험 치기`;
        } else {
            summaryText += `<br><span style="color: var(--success-color); font-size:16px;">💯 완벽해요! 모든 단어를 맞췄습니다! 👍</span>`;
            document.getElementById('retry-wrong-btn').style.display = 'none';
        }

        document.getElementById('result-summary').innerHTML = summaryText;
    }

    function playCurrentAudio() {
        if (!testQueue[currentIdx]) return;
        let audioData = testQueue[currentIdx].audio;
        if(audioData) {
            let audio = new Audio(audioData);
            audio.play().catch(e => console.log("자동 재생 오디오 제한됨:", e));
        } else {
            let tts = new SpeechSynthesisUtterance(testQueue[currentIdx].en);
            tts.lang = 'en-US';
            window.speechSynthesis.speak(tts);
        }
    }

    async function loadWordList() {
        dbWords = await localforage.getItem('wordbook') || [];
        let tbody = document.getElementById('word-list-tbody');
        tbody.innerHTML = '';

        dbWords.forEach(word => {
            let total = word.totalCount || 0;
            let wrong = word.wrongCount || 0;
            let statsText = total === 0 ? 
                `<span class="status-badge badge-new">신규 단어</span>` : 
                `<span class="status-badge badge-review">오답률 ${Math.round((wrong/total)*100)}%</span> (${wrong}/${total}회)`;

            let tr = document.createElement('tr');
            tr.innerHTML = `
                <td>
                    <strong>${word.en}</strong><br>
                    <span style="color:#4A5568;">${word.ko}</span>
                </td>
                <td>${statsText}</td>
                <td class="action-btns">
                    <button class="btn-edit" onclick="editWord(${word.id})">수정</button>
                    <button class="btn-delete" onclick="deleteWord(${word.id})">삭제</button>
                </td>
            `;
            tbody.appendChild(tr);
        });
    }

    async function saveWord() {
        let en = document.getElementById('word-en').value.trim();
        let ko = document.getElementById('word-ko').value.trim();
        let editId = document.getElementById('edit-id').value;

        if(!en || !ko) {
            alert("영어 단어와 한글 뜻을 모두 적어주세요!");
            return;
        }

        if(editId) {
            let targetIdx = dbWords.findIndex(w => w.id == editId);
            if(targetIdx !== -1) {
                dbWords[targetIdx].en = en;
                dbWords[targetIdx].ko = ko;
                if(currentBase64Audio) {
                    dbWords[targetIdx].audio = currentBase64Audio;
                }
            }
        } else {
            let newWord = {
                id: Date.now(),
                en: en,
                ko: ko,
                audio: currentBase64Audio,
                totalCount: 0,
                wrongCount: 0
            };
            dbWords.push(newWord);
        }

        await localforage.setItem('wordbook', dbWords);
        alert(editId ? "단어가 수정되었습니다." : "새로운 단어가 등록되었습니다.");
        resetForm();
        loadWordList();
    }

    function editWord(id) {
        let word = dbWords.find(w => w.id == id);
        if(!word) return;

        document.getElementById('edit-id').value = word.id;
        document.getElementById('word-en').value = word.en;
        document.getElementById('word-ko').value = word.ko;
        document.getElementById('form-title').innerText = "⚙️ 단어 수정 모드";
        document.getElementById('submit-btn').innerText = "✅ 수정 완료하기";
        document.getElementById('cancel-btn').style.display = "block";
        
        currentBase64Audio = word.audio || "";
        document.getElementById('play-recorded-btn').disabled = !currentBase64Audio;
        
        window.scrollTo({top: 0, behavior: 'smooth'});
    }

    async function deleteWord(id) {
        if(confirm("정말 이 단어를 삭제하시겠습니까? 데이터가 영구히 제거됩니다.")) {
            dbWords = dbWords.filter(w => w.id != id);
            await localforage.setItem('wordbook', dbWords);
            loadWordList();
        }
    }

    function resetForm() {
        document.getElementById('edit-id').value = "";
        document.getElementById('word-en').value = "";
        document.getElementById('word-ko').value = "";
        document.getElementById('form-title').innerText = "📝 새 단어 추가하기";
        document.getElementById('submit-btn').innerText = "✅ 단어 저장하기";
        document.getElementById('cancel-btn').style.display = "none";
        document.getElementById('play-recorded-btn').disabled = true;
        currentBase64Audio = "";
    }

    async function toggleRecording() {
        let btn = document.getElementById('record-btn');
        
        if (!mediaRecorder || mediaRecorder.state === "inactive") {
            try {
                let stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                audioChunks = [];
                mediaRecorder = new MediaRecorder(stream);
                
                mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
                mediaRecorder.onstop = () => {
                    let audioBlob = new Blob(audioChunks, { type: 'audio/mp3' });
                    let reader = new FileReader();
                    reader.readAsDataURL(audioBlob);
                    reader.onloadend = () => {
                        currentBase64Audio = reader.result;
                        document.getElementById('play-recorded-btn').disabled = false;
                    };
                };
                
                mediaRecorder.start();
                btn.innerText = "⏹️ 녹음 중지";
                btn.style.background = "var(--danger-color)";
            } catch (err) {
                alert("마이크 연결 실패: 권한 허용을 확인하세요.");
            }
        } else {
            mediaRecorder.stop();
            btn.innerText = "🔴 녹음 시작";
            btn.style.background = "#4A5568";
        }
    }

    function playRecorded() {
        if(currentBase64Audio) {
            new Audio(currentBase64Audio).play();
        }
    }

    async function backupData() {
        const words = await localforage.getItem('wordbook') || [];
        if (words.length === 0) {
            alert("백업할 단어가 없습니다. 먼저 단어를 등록해 주세요!");
            return;
        }
        
        try {
            const dataStr = JSON.stringify(words, null, 2);
            const dataBlob = new Blob([dataStr], { type: 'application/json' });
            const today = new Date().toISOString().slice(0, 10);
            const fileName = `wordbook_backup_${today}.json`;
            
            const url = URL.createObjectURL(dataBlob);
            const link = document.createElement('a');
            link.href = url;
            link.download = fileName;
            
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
            URL.revokeObjectURL(url);
        } catch (error) {
            alert("백업 파일 생성 중 오류가 발생했습니다: " + error.message);
        }
    }

    function triggerLoadFile() {
        document.getElementById('backup-file-input').click();
    }

    function loadBackupData(event) {
        const file = event.target.files[0];
        if (!file) return;

        const reader = new FileReader();
        reader.onload = async function(e) {
            try {
                const importedWords = JSON.parse(e.target.result);
                if (!Array.isArray(importedWords)) {
                    throw new Error("올바른 단어장 백업 파일 형식이 아닙니다.");
                }

                if (confirm(`선택한 파일에서 ${importedWords.length}개의 단어를 불러오시겠습니까?\n\n(주의: 기존 데이터는 덮어씌워집니다.)`)) {
                    await localforage.setItem('wordbook', importedWords);
                    alert("🎉 단어장 데이터 복원이 성공적으로 완료되었습니다!");
                    dbWords = importedWords;
                    loadWordList();
                }
            } catch (error) {
                alert("파일 읽기 오류: " + error.message);
            } finally {
                event.target.value = '';
            }
        };
        reader.readAsText(file);
    }
</script>
</body>
</html>
